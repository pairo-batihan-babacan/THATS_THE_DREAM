services:

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - fileconvert_tmp:/tmp/fileconvert
    env_file:
      - .env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Database is now Supabase — no local db container needed

  worker-default:
    build: .
    volumes:
      - .:/app
      - fileconvert_tmp:/tmp/fileconvert
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info -Q default --concurrency=4

  worker-heavy:
    build: .
    volumes:
      - .:/app
      - fileconvert_tmp:/tmp/fileconvert
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info -Q heavy --concurrency=2

  scheduler:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app beat --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build:
      context: ./pdfworks
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  fileconvert_tmp: