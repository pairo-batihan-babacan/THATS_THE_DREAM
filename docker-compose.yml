services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

  api:
    build: .
    volumes:
      - .:/app
      - fileconvert_tmp:/tmp/fileconvert
    env_file:
      - .env
    depends_on:
      - redis
      - minio
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker-default:
    build: .
    volumes:
      - .:/app
      - fileconvert_tmp:/tmp/fileconvert
    env_file:
      - .env
    depends_on:
      - redis
      - minio
    command: celery -A app.core.celery_app worker --loglevel=info -Q default --concurrency=4

  worker-heavy:
    build: .
    volumes:
      - .:/app
      - fileconvert_tmp:/tmp/fileconvert
    env_file:
      - .env
    depends_on:
      - redis
      - minio
    command: celery -A app.core.celery_app worker --loglevel=info -Q heavy --concurrency=2

  scheduler:
    build: .
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A app.core.celery_app beat --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build:
      context: ./pdfworks
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  fileconvert_tmp:
  minio_data:
