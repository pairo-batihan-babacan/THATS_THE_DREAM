<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FileConvert{% endblock %} — Convert. Compress. Clean.</title>
  <meta name="description" content="Free online file converter. PDF, image, audio, video tools. No account required. Files deleted automatically." />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">FileConvert</span>
      </a>
      <div class="nav-links">
        <a href="/pdf">PDF</a>
        <a href="/image">Image</a>
        <a href="/audio">Audio</a>
        <a href="/video">Video</a>
        <a href="/document">Document</a>
      </div>
      <button class="nav-hamburger" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="hamburger-icon">&#9776;</span>
      </button>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <span class="theme-icon-dark">☀</span>
        <span class="theme-icon-light">☽</span>
      </button>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p class="footer-brand"><span class="logo-icon">⚡</span> FileConvert</p>
      <p class="footer-privacy">
        Files are automatically deleted after 30 minutes.
        No account required. No data sold. Ever.
      </p>
      <div class="footer-links">
        <a href="/pdf">PDF</a>
        <a href="/image">Image</a>
        <a href="/audio">Audio</a>
        <a href="/video">Video</a>
        <a href="/document">Document</a>
      </div>
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
  <script>
    (function () {
      var toggle = document.getElementById('navToggle');
      var links  = document.querySelector('.nav-links');
      if (!toggle || !links) return;
      toggle.addEventListener('click', function () {
        var open = links.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
        toggle.querySelector('.hamburger-icon').textContent = open ? '\u00D7' : '\u2630';
      });
      // Close menu when a nav link is clicked
      links.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') {
          links.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
          toggle.querySelector('.hamburger-icon').textContent = '\u2630';
        }
      });
    })();
  </script>
</body>
</html>
